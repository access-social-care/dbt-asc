name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dbt-parse:
    name: Validate dbt project
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-snowflake
        run: pip install "dbt-snowflake>=1.7,<2.0"

      - name: dbt deps
        run: dbt deps
        env:
          SNOWFLAKE_USER: ci-dummy
          SNOWFLAKE_KEY_FILE: /dev/null

      - name: Set up CI profiles.yml
        # dbt-snowflake validates PEM format at profile load time (even during compile,
        # which never connects to Snowflake). /dev/null fails with MalformedFraming.
        # Generate a structurally valid but non-functional dummy key for CI.
        run: |
          mkdir -p ~/.dbt
          cp setup/profiles.yml.template ~/.dbt/profiles.yml
          openssl genrsa 2048 2>/dev/null | openssl pkcs8 -topk8 -nocrypt -out /tmp/ci_key.p8 2>/dev/null

      - name: dbt parse
        # Validates: YAML schema, ref()/source() resolution, model configs, test names,
        # and Jinja rendering. dbt parse is genuinely connection-free; dbt compile
        # initialises the Snowflake adapter session even though it never executes SQL.
        run: dbt parse
        env:
          SNOWFLAKE_USER: ci-dummy
          SNOWFLAKE_KEY_FILE: /tmp/ci_key.p8

  # --------------------------------------------------
  # CD: deploy to VM via org self-hosted runner
  # Runs only on push to main, and only if dbt-parse passes.
  # Was previously a standalone workflow (cd.yml) that never got
  # picked up by the runner (100% of runs cancelled after 24h
  # "awaiting a runner", 2026-05-26 through 2026-07-22). Merged
  # into this file, matching the combined CI+CD pattern that works
  # in ascFuncs/chatbot_data/helplines_data.
  # --------------------------------------------------
  deploy:
    name: Deploy via Self-Hosted Runner
    runs-on: self-hosted
    needs: dbt-parse
    if: github.event_name == 'push'

    steps:
      - name: Deploy latest changes
        run: |
          cd /srv/projects/dbt-asc

          git fetch origin
          git checkout main
          git reset --hard origin/main

          echo "Deployment successful"
          echo "Current commit: $(git rev-parse --short HEAD)"
          echo "Last commit message: $(git log -1 --pretty=%B)"
