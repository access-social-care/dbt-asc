name: 'asc'
version: '1.0.0'
config-version: 2

flags:
  send_anonymous_usage_stats: false

# This setting configures which "profile" dbt uses for this project.
profile: 'asc'

# These configurations specify where dbt should look for different types of files
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
models:
  asc:
    # Config defaults for all models
    +materialized: table
      
    staging:
      # Thin selection/rename layer over raw sources
      +materialized: table

      la_product:
        # Combined cross-source staging for LA Data Product
        +materialized: table
        +schema: la_product_staging

      acs_helplines:
        # Cross-source UT1/UT2-aggregated staging (Helplines + AdvicePro + AccessAva)
        +materialized: table
        +schema: staging_acs_helplines

    intermediate:
      # Aggregation layer between staging and marts
      +materialized: table

      la_product:
        # Gloucestershire aggregations (int_glos_*), all time windows pre-computed.
        # Same physical schema as staging.la_product — this is an organisational
        # split (staging vs intermediate folders), not a schema/location change.
        +materialized: table
        +schema: la_product_staging

    marts:
      # Business logic and aggregations
      +materialized: table
      
      chatbot:
        # Chatbot-specific marts
        +materialized: table

      la_product:
        # Pre-materialized views for LA Data Product PoC (35 models = 7 views x 5 windows)
        # RBAC: grant SELECT on this schema to ANALYTICS_LA_READER role only
        +materialized: table
        +schema: la_product

# Quoting behavior
# Use Snowflake defaults (unquoted = UPPERCASE)
# This matches Snowflake's standard behavior and simplifies identifier handling
quoting:
  database: false
  schema: false
  identifier: false
