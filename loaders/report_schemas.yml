# AdvicePro ReportRunner and Monday.com board schemas
#
# Schema registry for all upstream data sources consumed by loaders in this directory.
# Documents raw column names (as they appear in the source API) and their normalized
# equivalents after tolower + gsub(" ","_",.)).
#
# When you add a new loader, add an entry here.
# This is the single source of truth for upstream API column names.

reports:

  - id: FD7DXGL4
    name: Client demographics
    description: |
      One row per case with client demographic fields (age, age group, etc.).
      Used by load_advicepro_demographics_to_snowflake.R to populate
      CASEWORK.PUBLIC.ADVICEPRO_DEMOGRAPHICS.
      Joined to ADVICEPRO_CASEWORK on case_reference by stg_advicepro.
      TODO: Verify exact column names once first fetch is confirmed.
    consumed_by: load_advicepro_demographics_to_snowflake.R
    target_table: CASEWORK.PUBLIC.ADVICEPRO_DEMOGRAPHICS
    columns:
      - name: "Case Reference"
        normalized: case_reference
        description: Primary case identifier — joins to ADVICEPRO_CASEWORK.case_reference
      - name: "Age Range"
        normalized: age_range
        description: Client age band (e.g. '18-24') — used as AGE_BAND in stg_advicepro
      - name: "Gender"
        normalized: gender
      - name: "Do you have a disability"
        normalized: do_you_have_a_disability
      - name: "What type of disability do you consider you have"
        normalized: what_type_of_disability_do_you_consider_you_have
      - name: "Ethnic Origin"
        normalized: ethnic_origin

  - id: PWVDK69X
    name: Casework postcode lookup
    description: |
      One row per case with client postcode. Used by load_casework_locality_to_snowflake.R
      to resolve postcodes to geographic dimensions via findthatpostcode.uk.
    consumed_by: load_casework_locality_to_snowflake.R
    target_table: CASEWORK.PUBLIC.CASEWORK_LOCALITY
    columns:
      - name: "Case Reference"
        normalized: case_reference
        description: Primary case identifier — joins to ADVICEPRO_CASEWORK.case_reference
      - name: "Postcode"
        normalized: postcode
        description: Client postcode (raw, unvalidated)

# ── Monday.com board schemas ─────────────────────────────────────────────────
# Not AdvicePro reports, but documented here as the same principle applies:
# single source of truth for upstream column names before normalization.
# Column names are as returned by the Monday.com GraphQL API (ascFuncs::query_monday_board).

monday_boards:

  - id: "6737029126"
    name: Contracts board
    description: |
      One row per member organisation in the "Organisations with signed contract/agreement"
      group. Used by load_member_orgs_to_snowflake.R to populate
      REFERENCE.PUBLIC.MEMBER_ORGANISATIONS.
      Consumed via ascFuncs::query_monday_board() — item_name + Service column only.
    consumed_by: load_member_orgs_to_snowflake.R
    target_table: REFERENCE.PUBLIC.MEMBER_ORGANISATIONS
    columns:
      - name: item_name
        normalized: monday_name
        description: Official organisation name (board item title)
      - name: Service
        normalized: service_type
        description: |
          Contract/membership type (raw Monday.com column value).
          Standardised to Casework & Advice / Advice Membership etc. by case_when in loader.
      - name: group_title
        normalized: contract_group
        description: Board group name — filtered to "Organisations with signed contract/agreement"
