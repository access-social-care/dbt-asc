version: 2

models:
  - name: mart_chatbot_conversations_by_tenant_monthly
    description: |
      Monthly aggregation of chatbot conversation counts by tenant organization.
      
      **Purpose**: Tracks conversation volume trends over time for each tenant.
      Used by: data portal, tenant reports, executive dashboards
      
      **Refresh**: Daily (rebuilds entire table from source)
      **Grain**: One row per tenant per month
      
      **Business Rules**:
      - Month calculated using DATE_TRUNC('MONTH', created_at)
      - Only includes conversations with non-null tenant names
      - Ordered by month DESC (most recent first), then tenant name
      
      **Owner**: Product & Innovation team
      **Approval workflow**: Changes require PM sign-off via GitHub PR
    
    columns:
      - name: TENANT_NAME
        description: Organization name from tenant configuration
        tests:
          - not_null
      
      - name: CONVERSATION_MONTH
        description: First day of the month (YYYY-MM-01)
        tests:
          - not_null
      
      - name: CONVERSATION_COUNT
        description: Total number of conversations in this month
        tests:
          - not_null
      
      - name: UNIQUE_CONVERSATIONS
        description: Count of distinct transcript_ids (should match conversation_count)
      
      - name: FIRST_CONVERSATION_DATE
        description: Earliest conversation date in this month for this tenant
      
      - name: LAST_CONVERSATION_DATE
        description: Latest conversation date in this month for this tenant
    
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - TENANT_NAME
              - CONVERSATION_MONTH

  - name: mart_chatbot_conversations_by_tenant_total
    description: |
      All-time conversation counts by tenant organization.
      
      **Purpose**: Summary view of total tenant engagement across all time.
      Used by: data portal overview page, tenant comparison reports
      
      **Refresh**: Daily (rebuilds entire table from source)
      **Grain**: One row per tenant
      
      **Business Rules**:
      - Includes all conversations since chatbot launch
      - Only includes conversations with non-null tenant names
      - Ordered by total_conversations DESC (most active tenants first)
      
      **Owner**: Product & Innovation team
      **Approval workflow**: Changes require PM sign-off via GitHub PR
    
    columns:
      - name: TENANT_NAME
        description: Organization name from tenant configuration
        tests:
          - unique
          - not_null
      
      - name: TOTAL_CONVERSATIONS
        description: Total conversation count across all time
        tests:
          - not_null
      
      - name: UNIQUE_CONVERSATIONS
        description: Count of distinct transcript_ids (should match total_conversations)
      
      - name: FIRST_CONVERSATION_DATE
        description: Date of first recorded conversation for this tenant
      
      - name: LAST_CONVERSATION_DATE
        description: Date of most recent conversation for this tenant
      
      - name: DAYS_ACTIVE
        description: Number of days between first and last conversation
