version: 2

# All mart_glos_* models are in production serving the Gloucestershire LA data product.
# They are in the `la_product` schema (RBAC-restricted in Snowflake).
# Each view family has 5 time-window variants: 1m, 3m, 6m, 9m, 12m.
# All counts are small-number suppressed via la_suppress() — values < 5 shown as '1-5'.
#
# Lineage: stg_la_topic_mentions -> stg_la_topic_mentions_glos -> int_glos_* (models/intermediate/la_product/) -> mart_glos_*

models:

  # ---------------------------------------------------------------------------
  # mart_la_query_summary — cross-LA, all-time, all sources
  # ---------------------------------------------------------------------------

  - name: mart_la_query_summary
    description: |
      All-time query count by LA x source system x UT1 segment, across all LAs (not Glos-only).
      All three sources normalised to UT1 via Track 2 staging models.
      No time-window filtering — add WHERE QUERY_DATE clause for rolling periods.
      Not small-number suppressed.
      Used for ad-hoc cross-LA analysis, not the Gloucestershire product tables.
    columns:
      - name: LA_NAME
        description: Standardised CASSR local authority name
        tests: [not_null]
      - name: SOURCE_SYSTEM
        description: Originating system (AccessAva, AdvicePro, or Helplines)
        tests: [not_null, {accepted_values: {values: ['AccessAva', 'AdvicePro', 'Helplines']}}]
      - name: SEGMENT
        description: UT1 universal theme
      - name: QUERY_COUNT
        description: Total topic mentions for this LA x source x segment combination (all time)
        tests: [not_null]

  # ---------------------------------------------------------------------------
  # mart_glos_la_activity_summary — total queries by time window
  # ---------------------------------------------------------------------------

  - name: mart_glos_la_activity_summary_1m
    description: Gloucestershire total query count, last 1 month. Small-number suppressed. Production.
  - name: mart_glos_la_activity_summary_3m
