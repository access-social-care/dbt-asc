version: 2

sources:
  - name: accessava
    description: AccessAva chatbot conversation data loaded by chatbot_data ETL
    database: ava
    schema: public
    
    config:
      # Freshness checks - warn if data is stale
      freshness:
        warn_after: {count: 36, period: hour}  # Daily ETL runs at 05:00 UTC
        error_after: {count: 72, period: hour}
    
    tables:
      - name: accessava
        # loaded_at_field removed: created_at is DATE not TIMESTAMP; dbt source freshness
        # uses warehouse metadata (INFORMATION_SCHEMA.LAST_ALTERED) instead, which works
        # correctly and reflects actual ETL run time rather than data age.
        description: |
          Main fact table in AVA database.
          Fact table containing all chatbot conversations.
          One row = one conversation transcript.
          Loaded daily by chatbot_data/data_uploader.R at 05:00 UTC.
          
          **Data Quality**:
          - Core fields 100% complete (transcript_id, created_at)
          - Demographics <5% complete (known limitation)
          - ~15,000 conversations/year
        
        columns:
          - name: "transcript_id"
            description: Primary key - unique conversation identifier
            # Tests removed: Source data quality is chatbot_data ETL's responsibility
            # dbt focuses on testing transformation outputs (mart tables)
          
          - name: "created_at"
            description: Date conversation started (Date type, not timestamp)
            # Tests removed: dbt's generic test macros don't respect quoted identifiers in sources
          
          - name: "tenant_name"
            description: Organization name from tenant configuration
          
          # Verified column names from actual Snowflake table:
          # - tenant_name (tenant organization name)
          # Common columns based on chatbot_data/data_uploader.R:
          # - persona, supercategories, categories, csis, topic_entry_point
          # - letterCode, consumed_resources, local_authority_name
          # - age, ethnicity, religion, disability (demographics - mostly NULL)
          # - tenant_id (join key for accessava_locality)

      - name: accessava_locality
        description: |
          Locality dimension table for AccessAva conversations.
          One row = one transcript (conversation) with its resolved locality.
          Loaded by chatbot_data/data_uploader.R via chatbot_locality() in ascFuncs.
          chatbot_locality() queries PostgreSQL actions_locality, dedupes by transcript_id,
          and renames local_authority_name -> la_name.
          Joined to ACCESSAVA on transcript_id in stg_accessava.
        columns:
          - name: transcript_id
            description: Primary key — unique conversation identifier. FK to ACCESSAVA.transcript_id.
          - name: la_name
            description: LA name from postcode lookup (renamed from local_authority_name).
          - name: ward
            description: Ward name from postcode lookup. Used as LOCALITY_NAME in stg_accessava — matches the locality grain of stg_advicepro (ward from casework_locality).
          - name: ward_code
            description: ONS ward code.
          - name: lso_area_name
            description: LSOA name — available as finer locality grain if needed.
          - name: mso_area_name
            description: MSOA name — available as coarser locality grain if needed.

  - name: helplines
    description: Access Helplines call data loaded by helplines_data ETL
    database: helplines
    schema: public

    # Helplines data is delivered monthly by partners — month_date will always
    # lag ~1 month behind current date by design.
    config:
      freshness:
        warn_after: {count: 45, period: day}
        error_after: {count: 90, period: day}

    tables:
      - name: helplines_aggregated_full
        # loaded_at_field removed: month_date is DATE not TIMESTAMP; dbt source freshness
        # uses warehouse metadata (INFORMATION_SCHEMA.LAST_ALTERED) instead.
        description: |
          Pre-aggregated helplines call counts by LA and month.
          One row = one LA × month × UT1 call category combination.
          Loaded by helplines_data/load_to_snowflake.R.

          Note: This table is already aggregated (N = call count).
          stg_la_queries uses SUM(N) to align grain with row-level sources.
        columns:
          - name: la_name
            description: Local authority name
          - name: month_date
            description: End-of-month date for the aggregation period (YYYY-MM-DD)
          - name: n
            description: Number of calls in this LA × month × UT1 combination
          - name: UT1
            description: Top-level call category (helplines-specific taxonomy)

  - name: casework
    description: AdvicePro casework data loaded by advicePro_queries ETL
    database: casework
    schema: public

    # Loaded daily by advicePro_queries at 11:00 UTC.
    # opened_on reflects when cases were opened — good proxy for data currency.
    # Note: this measures data age, not ETL run freshness (TRUNCATE+INSERT means
    # the ETL always runs even with no new cases; INFORMATION_SCHEMA.LAST_ALTERED
    # is the ETL-health signal — see loaders/snowflake_staleness_check.R).
    config:
      freshness:
        warn_after: {count: 36, period: hour}
        error_after: {count: 72, period: hour}

    tables:
      - name: casework_locality
        description: |
          Postcode → geography lookup for AdvicePro cases.
          One row per case_reference (incremental append, never updated).
          Built by loaders/load_casework_locality_to_snowflake.R via findthatpostcode.uk API.
          Joins to advicepro_casework on case_reference to add sub-LA geographic dimensions.
        columns:
          - name: case_reference
            description: FK to advicepro_casework.case_reference
          - name: postcode
            description: Raw client postcode used for the lookup
          - name: ward
            description: Electoral ward name (sub-LA locality used in stg_la_queries)
          - name: ward_code
            description: ONS ward code
          - name: lso_area_name
            description: LSOA name (more granular sub-LA alternative to ward)
          - name: lso_area_code
            description: LSOA code
          - name: mso_area_name
            description: MSOA name
          - name: la_name
            description: LA name resolved from postcode (cross-check vs advicepro_casework.la_name)

      - name: advicepro_demographics
        description: |
          Client demographic fields per case.
          One row per case_reference (full replace on each load).
          Loaded by loaders/load_advicepro_demographics_to_snowflake.R from AdvicePro report FD7DXGL4.
          Joined to advicepro_casework on case_reference in stg_advicepro.
          117 rows as of first load (May 2026). Column names confirmed from live run.
        columns:
          - name: case_reference
            description: FK to advicepro_casework.case_reference
          - name: age_range
            description: Client age band (e.g. '18-24') — used as AGE_BAND in stg_advicepro
          - name: gender
            description: Client gender
          - name: do_you_have_a_disability
            description: Disability flag (free-text yes/no)
          - name: what_type_of_disability_do_you_consider_you_have
            description: Disability type description
          - name: ethnic_origin
            description: Client ethnicity

      - name: advicepro_casework
        # loaded_at_field removed: opened_on is DATE not TIMESTAMP; dbt source freshness
        # uses warehouse metadata (INFORMATION_SCHEMA.LAST_ALTERED) instead.
        description: |
          Main casework fact table.
          One row = one case (case_reference is the primary key).
          Loaded by advicePro_queries/load_advicepro_to_snowflake.R.

          **Grain**: One row per case_reference.
          Multi-valued fields (super_category, case_specific_issues, case_outcome) are
          semicolon-joined in this table. Use the corresponding BRIDGE/DIM tables
          (SUPER_CATEGORY_BRIDGE, CSI_BRIDGE, OUTCOME_BRIDGE, etc.) for analytics joins.

          **Data Quality**:
          - case_reference uniqueness is enforced by the ETL collapse step
          - case_outcome is NULL for open/active cases
          - Topics (super_category etc.) are NULL where not recorded

        columns:
          - name: case_reference
            description: Primary key - unique case identifier
          - name: case_open_month
            description: Month the case was opened (YYYY/MM format)
          - name: case_close_month
            description: Month the case was closed (YYYY/MM), or 9999/12 if still open
          - name: case_status
            description: Current case status (Active, Enquiry, or closed value)
          - name: case_level
            description: Case level classification
          - name: case_outcome
            description: |
              Semicolon-joined outcome values. NULL for open/active cases.
              Use OUTCOME_BRIDGE + OUTCOME_DIM for analytics joins on individual outcomes.
          - name: number_of_cases
            description: Always 1 - one row per case, used for simple SUM aggregation
          - name: referred_from_account
            description: Raw AdvicePro member name
          - name: member_canonical_name
            description: Canonical member name mapped from referred_from_account
          - name: la_name
            description: Standardised CASSR local authority name (renamed from local_authority by ETL)
          - name: la_code
            description: ONS local authority code
          - name: la_name_original
            description: Original pre-standardisation local authority value
