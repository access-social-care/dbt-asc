version: 2

sources:
  - name: accessava
    description: AccessAva chatbot conversation data loaded by chatbot_data ETL
    database: ava
    schema: public
    
    config:
      # Freshness checks - warn if data is stale
      freshness:
        warn_after: {count: 36, period: hour}  # Daily ETL runs at 05:00 UTC
        error_after: {count: 72, period: hour}
    
    tables:
      - name: accessava
        # loaded_at_field removed: created_at is DATE not TIMESTAMP; dbt source freshness
        # uses warehouse metadata (INFORMATION_SCHEMA.LAST_ALTERED) instead, which works
        # correctly and reflects actual ETL run time rather than data age.
        description: |
          Main fact table in AVA database.
          Fact table containing all chatbot conversations.
          One row = one conversation transcript.
          Loaded daily by chatbot_data/data_uploader.R at 05:00 UTC.
          
          **Data Quality**:
          - Core fields 100% complete (transcript_id, created_at)
          - Demographics <5% complete (known limitation)
          - ~15,000 conversations/year
        
        columns:
          - name: "transcript_id"
            description: Primary key - unique conversation identifier
            # Tests removed: Source data quality is chatbot_data ETL's responsibility
            # dbt focuses on testing transformation outputs (mart tables)
          
          - name: "created_at"
            description: Date conversation started (Date type, not timestamp)
            # Tests removed: dbt's generic test macros don't respect quoted identifiers in sources
          
          - name: "tenant_name"
            description: Organization name from tenant configuration
          
          - name: la_name
            description: Standardised CASSR local authority name. Used as LA_NAME in stg_accessava.
          - name: categories
            description: |
              Semicolon-space-joined list of conversation categories (e.g. "Housing; Benefits").
              Used as SEGMENT in stg_accessava (raw-category track). Split on '; '.
          - name: topic_entry_point
            description: |
              Semicolon-space-joined list of topic entry points (e.g. "Funding; Legal issues").
              Used as SEGMENT in stg_accessava_segments (UT1-mapped track). Split on '; '.
              Mapped to UT1 via REFERENCE.PUBLIC.TOPIC_ENTRY_POINT_MAP.
          - name: age
            description: Age band of the user (demographics — mostly NULL).
          - name: lettercode
            description: Letter code if a formal letter was generated. NULL if no letter. Used for HAS_LETTER flag.
          - name: transcript_id
            description: Join key to accessava_locality.
          # Additional columns present in table (not used in current models):
          # - persona, supercategories, csis, consumed_resources, local_authority_name
          # - ethnicity, religion, disability (demographics - mostly NULL)
          # - tenant_id

      - name: accessava_locality
        description: |
          Locality dimension table for AccessAva conversations.
          One row = one transcript (conversation) with its resolved locality.
          Loaded by chatbot_data/data_uploader.R via chatbot_locality() in ascFuncs.
          chatbot_locality() queries PostgreSQL actions_locality, dedupes by transcript_id,
          and renames local_authority_name -> la_name.
          Joined to ACCESSAVA on transcript_id in stg_accessava.
        columns:
          - name: transcript_id
            description: Primary key — unique conversation identifier. FK to ACCESSAVA.transcript_id.
          - name: la_name
            description: LA name from postcode lookup (renamed from local_authority_name).
          - name: ward
            description: Ward name from postcode lookup. Used as LOCALITY_NAME in stg_accessava — matches the locality grain of stg_advicepro (ward from casework_locality).
          - name: ward_code
            description: ONS ward code.
          - name: lso_area_name
            description: LSOA name — available as finer locality grain if needed.
          - name: mso_area_name
            description: MSOA name — available as coarser locality grain if needed.

  - name: helplines
    description: Access Helplines call data loaded by helplines_data ETL
    database: helplines
    schema: public

    # Helplines data is delivered monthly by partners — month_date will always
    # lag ~1 month behind current date by design.
    config:
      freshness:
        warn_after: {count: 45, period: day}
        error_after: {count: 90, period: day}

    tables:
      - name: helplines_aggregated_full
        # loaded_at_field removed: month_date is DATE not TIMESTAMP; dbt source freshness
        # uses warehouse metadata (INFORMATION_SCHEMA.LAST_ALTERED) instead.
        description: |
          Pre-aggregated helplines call counts by LA and month.
          One row = one LA × month × UT1 call category combination.
          Loaded by helplines_data/load_to_snowflake.R.

          Note: This table is already aggregated (N = call count).
          stg_la_queries uses SUM(N) to align grain with row-level sources.
        columns:
          - name: LA_NAME
            description: Local authority name
          - name: MONTH_DATE
            description: End-of-month date for the aggregation period (YYYY-MM-DD)
          - name: N
            description: Number of calls in this LA × month × UT1 combination
          - name: UT1
            description: |
              Top-level helplines call category (9 distinct values):
              Assessments, Care plan, Carers, Charging, Direct payments,
              Information Seeking, Legal issues and complaints, Mental capacity, Safeguarding.
              Used as SEGMENT in stg_helplines and mart_la_query_summary.

  - name: casework
    description: AdvicePro casework data loaded by advicePro_queries ETL
    database: casework
    schema: public

    # Loaded daily by advicePro_queries at 11:00 UTC.
    # opened_on reflects when cases were opened — good proxy for data currency.
    # Note: this measures data age, not ETL run freshness (TRUNCATE+INSERT means
    # the ETL always runs even with no new cases; INFORMATION_SCHEMA.LAST_ALTERED
    # is the ETL-health signal — see loaders/snowflake_staleness_check.R).
    config:
      freshness:
        warn_after: {count: 36, period: hour}
        error_after: {count: 72, period: hour}

    tables:
      - name: casework_locality
        config:
          freshness: null
        description: |
          Postcode → geography lookup for AdvicePro cases.
          One row per case_reference (incremental append, never updated).
          Built by loaders/load_casework_locality_to_snowflake.R via findthatpostcode.uk API.
          Joins to advicepro_casework on case_reference to add sub-LA geographic dimensions.
        columns:
          - name: case_reference
            description: FK to advicepro_casework.case_reference
          - name: postcode
            description: Raw client postcode used for the lookup
          - name: ward
            description: Electoral ward name (sub-LA locality used in stg_la_queries)
          - name: ward_code
            description: ONS ward code
          - name: lso_area_name
            description: LSOA name (more granular sub-LA alternative to ward)
          - name: lso_area_code
            description: LSOA code
          - name: mso_area_name
            description: MSOA name
          - name: la_name
            description: LA name resolved from postcode (cross-check vs advicepro_casework.la_name)

      - name: case_topic_bridge
        description: |
          Paired case x topic bridge built from PRE-COLLAPSE report rows by
          advicePro_queries/load_advicepro_to_snowflake.R, so the
          group<->csi pairing is preserved (the per-field CSI_GROUP/CSI
          bridges cannot provide this).
          One row = one distinct case x (csi_group, csi) pair.
          S_C_CSI_ID is a deterministic MD5 FK to REFERENCE.PUBLIC.S_C_CSI_MAP;
          NULL means the pair is not in the canonical taxonomy (drift - the
          ETL logs it loudly at load time).
        columns:
          - name: case_reference
            description: FK to advicepro_casework.case_reference
          - name: s_c_csi_id
            description: FK to reference.s_c_csi_map.s_c_csi_id (NULL = taxonomy drift)
            tests:
              - relationships:
                  to: source('reference', 's_c_csi_map')
                  field: s_c_csi_id
                  config:
                    severity: warn
          - name: csi_group_raw
            description: Raw case_specific_issues_group value as received (drift evidence)
          - name: csi_raw
            description: Raw case_specific_issues value as received (drift evidence)

      - name: advicepro_demographics
        description: |
          Client demographic fields per case.
          One row per case_reference (full replace on each load).
          Loaded by loaders/load_advicepro_demographics_to_snowflake.R from AdvicePro report FD7DXGL4.
          Joined to advicepro_casework on case_reference in stg_advicepro.
          117 rows as of first load (May 2026). Column names confirmed from live run.
        columns:
          - name: case_reference
            description: FK to advicepro_casework.case_reference
          - name: age_range
            description: Client age band (e.g. '18-24') — used as AGE_BAND in stg_advicepro
          - name: gender
            description: Client gender
          - name: do_you_have_a_disability
            description: Disability flag (free-text yes/no)
          - name: what_type_of_disability_do_you_consider_you_have
            description: Disability type description
          - name: ethnic_origin
            description: Client ethnicity

      - name: advicepro_casework
        # loaded_at_field removed: opened_on is DATE not TIMESTAMP; dbt source freshness
        # uses warehouse metadata (INFORMATION_SCHEMA.LAST_ALTERED) instead.
        description: |
          Main casework fact table.
          One row = one case (case_reference is the primary key).
          Loaded by advicePro_queries/load_advicepro_to_snowflake.R.

          **Grain**: One row per case_reference.
          Multi-valued fields (super_category, case_specific_issues, case_outcome) are
          semicolon-joined in this table. Use the corresponding BRIDGE/DIM tables
          (SUPER_CATEGORY_BRIDGE, CSI_BRIDGE, OUTCOME_BRIDGE, etc.) for analytics joins.

          **Data Quality**:
          - case_reference uniqueness is enforced by the ETL collapse step
          - case_outcome is NULL for open/active cases
          - Topics (super_category etc.) are NULL where not recorded

        columns:
          - name: case_reference
            description: Primary key - unique case identifier
          - name: case_open_month
            description: Month the case was opened (YYYY/MM format)
          - name: case_close_month
            description: Month the case was closed (YYYY/MM), or 9999/12 if still open
          - name: case_status
            description: Current case status (Active, Enquiry, or closed value)
          - name: case_level
            description: Case level classification
          - name: case_outcome
            description: |
              Semicolon-joined outcome values. NULL for open/active cases.
              Use OUTCOME_BRIDGE + OUTCOME_DIM for analytics joins on individual outcomes.
          - name: case_specific_issues_group
            description: |
              Semicolon-joined list of case-specific issue groups (e.g. "Care needs;Funding").
              Used as SEGMENT in stg_advicepro (raw-category track). Split on ';' (no space).
          - name: case_specific_issues
            description: |
              Semicolon-joined list of individual case-specific issues.
              Pre-exploded into case_topic_bridge for analytics joins (do not split this directly).
          - name: super_category
            description: |
              Semicolon-joined list of supercategories (e.g. "Community Care;Mental Capacity").
              Pre-exploded into case_topic_bridge for analytics joins.
          - name: number_of_cases
            description: Always 1 - one row per case, used for simple SUM aggregation
          - name: referred_from_account
            description: Raw AdvicePro member name
          - name: member_canonical_name
            description: Canonical member name mapped from referred_from_account
          - name: la_name
            description: Standardised CASSR local authority name (renamed from local_authority by ETL)
          - name: la_code
            description: ONS local authority code
          - name: la_name_original
            description: Original pre-standardisation local authority value

  - name: reference
    description: |
      Shared lookup/mapping tables in REFERENCE.PUBLIC.
      UT1/topic maps are loaded by helplines_data/one_time/load_reference_maps.R
      from xlsx sources in helplines_data/intermediate/ (drop + reload on change);
      S_C_CSI_MAP is maintained directly in Snowflake (see
      advicePro_queries/one_time/s_c_csi_map_cleanup.sql).
      NOTE: these models assume the post-reload UPPERCASE column convention.
      Tables loaded before the uppercase migration carry quoted lowercase
      columns and will fail compilation-time column resolution until reloaded.
    database: reference
    schema: public
    tables:
      - name: universal_themes_map
        description: |
          Cross-org category -> UT1/UT2 taxonomy map ("Universal codes").
          One row = one org x t1 x t2 combination.
          advicepro rows are keyed on the canonical S_C_CSI_MAP taxonomy:
          Community Care -> (t1 = category, t2 = case_specific_issue);
          other supercategories -> (t1 = supercategory, t2 = category).
          UT2 uses the literal string 'NA' for not-applicable in places -
          consumers must NULLIF(ut2, 'NA').
        columns:
          - name: org
            description: Source organisation key (lowercase, e.g. advicepro, cab, mencap)
          - name: t1
            description: Org-specific top-level category
          - name: t2
            description: Org-specific subcategory
          - name: ut1
            description: Universal theme level 1 (9 canonical values + Advocacy, COVID-19, Cuts, Funding disputes, UNMATCHED)
          - name: ut2
            description: Universal theme level 2 (sparse; 'NA' literal where not applicable)

      - name: topic_entry_point_map
        description: |
          AccessAva topic_entry_point -> UT1/UT2 map.
          31 rows (16 original lowercase entries + 15 CamelCase entries added
          for the second-generation chatbot UI entry points).
          Unmapped/NULL entry points map to 'Unmatched'.
          Source: intermediate/Topic entry point map.xlsx (Sheet1).
          Reload required: run one_time/load_reference_maps.R whenever the
          xlsx changes — dbt alone will not pick up map updates.
        columns:
          - name: topic_entry_point
            description: Raw AccessAva topic entry point value
          - name: ut1
            description: Universal theme level 1
          - name: ut2
            description: Universal theme level 2 (mostly NULL)

      - name: s_c_csi_map
        description: |
          Canonical AdvicePro taxonomy: supercategory x category x
          case_specific_issue triplets, including '[Category only]' rows for
          casework records with no csi recorded.
          S_C_CSI_ID = MD5(supercategory || '|' || category || '|' || case_specific_issue).
        columns:
          - name: supercategory
            description: Canonical supercategory (e.g. Community Care, Mental Capacity, Money / benefits)
          - name: category
            description: Canonical category within the supercategory
          - name: case_specific_issue
            description: Canonical case-specific issue ('[Category only]' for category-level records)
          - name: s_c_csi_id
            description: Deterministic MD5 primary key
            tests:
              - unique
              - not_null

      # ── External reference data — lann / Census (admin#13) ────────────────
      # Loaded one-time from signal_processing/lann/ via
      # signal_processing/one_time/load_lann_to_snowflake.R.
      # Refresh cadence: Census ~10yr; LANN features after each LANN run.

      # Census 2021 raw UTLA tables
      - name: census_ts007a_utla
        description: "Census 2021 TS007a — population by single year of age, UTLA grain."
      - name: census_ts021_utla
        description: "Census 2021 TS021 — ethnic group, UTLA grain. Used by la_peer_signals_poc.R for per-100k rates."
      - name: census_ts029_utla
        description: "Census 2021 TS029 — English language proficiency, UTLA grain."
      - name: census_ts038_utla
        description: "Census 2021 TS038 — disability (Equality Act), UTLA grain."
      - name: census_ts051_utla
        description: "Census 2021 TS051 — number of rooms, UTLA grain."
      - name: census_ts054_utla
        description: "Census 2021 TS054 — housing tenure, UTLA grain."
      - name: census_ts062_utla
        description: "Census 2021 TS062 — NS-SEC socioeconomic classification, UTLA grain."
      - name: census_ts067_utla
        description: "Census 2021 TS067 — highest qualification level, UTLA grain."
      - name: census_rm073_utla
        description: "Census 2021 RM073 — disability by age band, UTLA grain."
      - name: census_rm070_utla
        description: |
          Census 2021 RM070 (custom flexible table) — disability × age × ethnicity, UTLA grain.
          Source: ONS flexible table builder (15,750 rows).
          Reproduce at: https://www.ons.gov.uk/datasets/RM070/editions/2021/versions/1/filter-outputs/387852b1-4506-4ea3-b7fe-f3a6693614c5#get-data

      # LANN peer-grouping feature inputs (UTLA-level derived from Census 2021)
      - name: lann_ethnicity
        description: "LANN feature — ethnic group percentages by UTLA. Derived from TS021."
      - name: lann_english_proficiency
        description: "LANN feature — English proficiency percentages by UTLA. Derived from TS029."
      - name: lann_housing_tenure
        description: "LANN feature — housing tenure percentages by UTLA. Derived from TS054."
      - name: lann_ns_sec
        description: "LANN feature — NS-SEC percentages by UTLA. Derived from TS062."
      - name: lann_population_data
        description: "LANN feature — population by age band, UTLA grain. Derived from TS007a."
      - name: lann_qualification_level
        description: "LANN feature — qualification level percentages by UTLA. Derived from TS067."
      - name: lann_rooms
        description: "LANN feature — number of rooms percentages by UTLA. Derived from TS051."
      - name: lann_area_sqkm
        description: "LANN feature — area in km², LSOA grain. From ONS Standard Area Measurements."
      - name: lann_distance_to_sea
        description: "LANN feature — distance to nearest coastline (km), LSOA grain."

      # Geographic lookups
      - name: lsoa21_to_utla22
        description: "ONS best-fit lookup: LSOA (2021) to UTLA (2022)."
      - name: sam_utla_2021
        description: "ONS Standard Area Measurements — UTLA grain, December 2021."

  # ── External data portal (amit_claude_data_firecrawl) ──────────────────────
  # Fetched by the ASC data refresh agent. CSVs land in
  # amit_claude_data_firecrawl/data/; loaded to Snowflake via
  # dbt-asc/loaders/load_data_portal_to_snowflake.R (TODO — not yet written).
  # Last agent run: 2026-06-30T09:24Z (manifest.json run_id bf18de6b194a).
  - name: data_portal
    description: |
      External ASC datasets fetched by the data refresh agent
      (amit_claude_data_firecrawl). All tables are UTLA grain unless noted.
      Loader: dbt-asc/loaders/load_data_portal_to_snowflake.R (pending).
    database: reference
    schema: public
    tables:
      - name: ascfr_salt
        description: |
          ASCFR & SALT — adult social care activity and finance by LA (NHS Digital).
          Last loaded: 2023-24 release (OVERDUE — 27 months; expected within 18).
          Next update: N/A — SALT discontinued after 2023-24; successor is CLD via DHSC.
          Source: https://digital.nhs.uk/data-and-information/publications/statistical/adult-social-care-activity-and-finance-report

      - name: cqc_ratings
        description: |
          CQC ratings — adult social care locations, rolled up to LA level.
          Last loaded: 2026-06-01 (June 2026 monthly release, 26MB ODS).
          Next update: July 2026 (monthly cadence).
          Source: https://www.cqc.org.uk/about-us/transparency/using-cqc-data

      - name: asc_workforce
        description: |
          Adult social care workforce by LA (Skills for Care).
          Last loaded: 2024-25 release (updated 2025-10-14).
          Next update: ~October 2026 (annual, typically released Oct/Nov).
          Source: https://www.skillsforcare.org.uk

      - name: people_receiving_care
        description: |
          People receiving adult social care — STS001 (new clients) + LTS001 (long-term),
          tidy format, merged into one source-tagged frame.
          Last loaded: 2024-25 release.
          Next update: ~mid-2027 (annual DHSC activity report).
          Source: https://www.gov.uk/government/statistics/adult-social-care-activity-report-england

      - name: dols
        description: |
          Deprivation of Liberty Safeguards — applications received and granted by LA.
          Last loaded: 2024-25 release.
          Next update: ~2027 (annual DHSC publication).
          Source: https://www.gov.uk/government/statistics/deprivation-of-liberty-safeguards-england

      - name: population
        description: |
          Mid-year population estimates by LA (NOMIS NM_31_1), total all ages.
          Last loaded: 2026-06-30 (218 rows, NOMIS live pull).
          Next update: annual — re-run agent when ONS releases next mid-year estimates (~mid-2027).
          Source: nomis://NM_31_1?geography=TYPE154&date=latest&sex=7&age=0&measures=20100

      - name: disability_prevalence
        description: |
          Disability prevalence by LA — Census 2021 (NOMIS NM_2093_1).
          Categories: limited a lot / limited a little / not disabled. 331 rows (pivoted to one row per LA).
          Last loaded: 2026-06-30 (one-off Census 2021 extract).
          Next update: Census 2031 (~5 years).
          Source: nomis://NM_2093_1?geography=TYPE154&measures=20100

      - name: imd_deprivation
        description: |
          English Indices of Deprivation 2025 (IDAOPI), upper-tier LA summary.
          Last loaded: 2025 release (IoD2025 File 11).
          Next update: ~2029 (IoD published roughly every 4 years).
          Source: https://www.gov.uk/government/statistics/english-indices-of-deprivation-2025

      - name: ombudsman
        description: |
          LGSCO adult social care complaint reviews — complaints decided by LA.
          Last loaded: 2024-25 release.
          Next update: ~mid-2026 (annual LGSCO publication).
          Source: https://www.lgo.org.uk/information-centre/reports/annual-review-reports/adult-social-care-reviews

      - name: discharge_delays
        description: |
          LIMITATION — metric discontinued. Delays attributable to ASC was a DTOC metric
          (ended ~2020); the Discharge Ready Date successor does not attribute delays to ASC.
          Not loaded to Snowflake. Retained in registry as a documented gap.
          Source: https://www.england.nhs.uk/statistics/statistical-work-areas/discharge-delays-acute-data/
