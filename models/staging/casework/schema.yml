version: 2

models:
  - name: stg_casework__cases
    description: |
      Staging model for AdvicePro casework data.

      **Grain**: One row per case_reference (primary key). This is the core
      data quality invariant for ADVICEPRO_CASEWORK. Multi-valued fields
      (case_outcome, super_category, etc.) are semicolon-joined strings.

      **Refresh**: On-demand (ETL runs manually via load_advicepro_to_snowflake.R)
      **Owner**: Data team

    config:
      store_failures: true

    columns:
      - name: case_reference
        description: Primary key - unique case identifier
        tests:
          - unique:
              config:
                store_failures: true
                severity: error
          - not_null:
              config:
                severity: error

      - name: case_open_month
        description: Month the case was opened (YYYY/MM format)
        tests:
          - not_null:
              config:
                severity: warn

      - name: case_status
        description: Current case status
        tests:
          - not_null:
              config:
                severity: warn

      - name: number_of_cases
        description: Always 1 - one row per case
        tests:
          - not_null:
              config:
                severity: error

      - name: case_outcome
        description: |
          Semicolon-joined outcome values. NULL for open/active cases.
          NULL is expected and valid here - not a data quality issue.

      - name: case_close_month
        description: Month the case was closed (YYYY/MM), or 9999/12 if still open

      - name: case_level
        description: Case level classification

      - name: referred_from_account
        description: Raw AdvicePro member name

      - name: member_canonical_name
        description: Canonical member name mapped from referred_from_account

      - name: local_authority
        description: Standardised CASSR local authority name

      - name: la_code
        description: ONS local authority code

      - name: la_name_original
        description: Original pre-standardisation local authority value

      - name: super_category
        description: Semicolon-joined super category values

      - name: case_specific_issues_group
        description: Semicolon-joined case specific issues group values

      - name: case_specific_issues
        description: Semicolon-joined case specific issues values
